<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wordlink</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app">
      <section class="lobby" id="lobbyView">
        <header class="lobby-hero">
          <div class="brand">
            <div class="mark" aria-hidden="true">WL</div>
            <div>
              <h1>Wordlink</h1>
              <p>Build the chain. Own the last word.</p>
            </div>
          </div>
          <div class="sample-chain" aria-label="Example word chain">
            <span>side</span>
            <b>line</b>
            <span>dance</span>
            <span>off</span>
            <span>road</span>
          </div>
        </header>

        <div class="lobby-grid">
          <form class="panel" id="createForm">
            <div class="panel-head">
              <h2>Create Game</h2>
              <span class="badge">Host</span>
            </div>
            <label>
              Your name
              <input name="name" maxlength="24" autocomplete="name" placeholder="Player A" required>
            </label>
            <label>
              Turn timer
              <select name="timerSeconds">
                <option value="30">30 seconds</option>
                <option value="45" selected>45 seconds</option>
                <option value="60">60 seconds</option>
                <option value="90">90 seconds</option>
              </select>
            </label>
            <label class="toggle-row">
              <input name="challenges" type="checkbox" checked>
              <span>Allow challenges</span>
            </label>
            <button type="submit">Create room</button>
          </form>

          <form class="panel" id="joinForm">
            <div class="panel-head">
              <h2>Join Game</h2>
              <span class="badge badge-blue">Guest</span>
            </div>
            <label>
              Your name
              <input name="name" maxlength="24" autocomplete="name" placeholder="Player B" required>
            </label>
            <label>
              Room code
              <input name="code" maxlength="5" class="code-input" placeholder="A7K2Q" required>
            </label>
            <button type="submit">Join room</button>
          </form>
        </div>
      </section>

      <section class="game hidden" id="gameView">
        <header class="topbar">
          <div class="brand brand-small">
            <div class="mark" aria-hidden="true">WL</div>
            <div>
              <h1>Wordlink</h1>
              <p id="roomLine">Room -----</p>
            </div>
          </div>
          <div class="room-actions">
            <button class="icon-button" id="copyCodeButton" type="button" title="Copy room code">Copy</button>
            <button class="ghost" id="leaveButton" type="button">Leave</button>
          </div>
        </header>

        <section class="turn-board">
          <div class="turn-copy">
            <span class="label">Current word</span>
            <strong id="promptWord">line</strong>
            <p id="gameMessage">Waiting for the room.</p>
          </div>
          <div class="timer-card">
            <span class="label">Timer</span>
            <strong id="timer">--</strong>
          </div>
        </section>

        <div class="play-grid">
          <section class="play-area">
            <div class="entry-panel" id="entryPanel">
              <div class="turn-strip">
                <span class="label">Turn</span>
                <strong id="turnName">-</strong>
              </div>

              <form id="playForm" class="play-form">
                <div class="compound-builder">
                  <span class="word-tile locked" id="fixedWord">line</span>
                  <span class="plus">+</span>
                  <input name="word" autocomplete="off" placeholder="next word" maxlength="24">
                </div>
                <button type="submit">Play link</button>
              </form>

              <p class="error" id="errorText" role="alert"></p>
              <div class="suggestions" id="suggestions"></div>

              <div class="review-panel hidden" id="reviewPanel">
                <span class="label">Review link</span>
                <strong id="reviewPhrase">word link</strong>
                <p id="reviewCopy">Your opponent can accept or challenge this link.</p>
                <div class="review-actions">
                  <button id="acceptButton" type="button">Accept</button>
                </div>
              </div>

              <div class="response-row">
                <button class="ghost" id="challengeButton" type="button">Challenge</button>
                <button class="ghost" id="rematchButton" type="button">Rematch</button>
              </div>
            </div>
          </section>

          <aside class="side-panel">
            <div class="players" id="players"></div>
            <div class="chain-head">
              <h2>Chain</h2>
              <span class="label">Newest first</span>
            </div>
            <ol class="chain" id="chain"></ol>
          </aside>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
